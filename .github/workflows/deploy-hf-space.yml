name: Deploy Hugging Face Space

# Intentionally scoped to pushes on main and manual dispatch only.
# Pull requests used to trigger a force-push to the HF Space main branch,
# which meant every PR opened by a contributor could overwrite production.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-space-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HF_SPACE_TOKEN: ${{ secrets.HF_SPACE_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID || 'Ma-Ri-Ba-Ku/Clafoutis' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face Space
        shell: bash
        run: |
          set -euo pipefail
          EFFECTIVE_HF_TOKEN="${HF_SPACE_TOKEN:-${HF_TOKEN:-}}"
          if [ -z "${EFFECTIVE_HF_TOKEN}" ]; then
            echo "No token found; set HF_SPACE_TOKEN or HF_TOKEN in GitHub Secrets. Skipping deployment."
            exit 0
          fi

          if [ ! -f Dockerfile ]; then
            echo "Dockerfile missing at repository root"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add hf-space "https://oauth2:${EFFECTIVE_HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force hf-space HEAD:main
