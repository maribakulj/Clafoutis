name: Deploy Hugging Face Space

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-space-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ (github.event_name != 'pull_request' || (!github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository)) && secrets.HF_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID || 'Ma-Ri-Ba-Ku/Clafoutis' }}
    steps:
      - name: Show deployment target
        run: echo "Deploying to ${HF_SPACE_ID} from ${GITHUB_REF}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Hugging Face token
        shell: bash
        run: |
          set -euo pipefail
          status_code=$(curl -sS -o /tmp/hf-whoami.json -w "%{http_code}" \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            https://huggingface.co/api/whoami-v2)

          if [ "$status_code" != "200" ]; then
            echo "HF token validation failed with status $status_code"
            cat /tmp/hf-whoami.json || true
            exit 1
          fi

          echo "HF token validated successfully"

      - name: Deploy to Hugging Face Space
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f Dockerfile ]; then
            echo "Dockerfile missing at repository root"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Hugging Face git auth with access token must use __token__ as username.
          git remote add hf-space "https://__token__:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"

          # Quick auth check before push for clearer logs.
          git ls-remote hf-space >/dev/null

          # Use a normal push; avoids failures on remotes that reject force-pushes.
          git push hf-space HEAD:main
